<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تطبيق قرآني فاخر لقراءة القرآن الكريم مع تصميم أنيق وتفاعلات سلسة - Premium Quran reading application">
    <meta name="theme-color" content="#1a1f2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="القرآن الكريم - Al-Quran">
    <meta property="og:description" content="تطبيق قرآني فاخر لقراءة القرآن الكريم">
    <meta property="og:type" content="website">
    
    <title>القرآن الكريم - Al-Quran</title>
    
    <!-- Fonts with Optimized Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Fallback System Fonts for Instant Display -->
    <style>
        @font-face {
            font-family: 'Amiri-Fallback';
            src: local('Georgia'), local('serif');
        }
        
        @font-face {
            font-family: 'Cairo-Fallback';
            src: local('-apple-system'), local('BlinkMacSystemFont'), local('Segoe UI'), local('Roboto'), local('Oxygen'), local('Ubuntu'), local('Cantarell'), local('sans-serif');
        }
    </style>
    
    <style>
        /* ===========================
           CSS VARIABLES & ROOT STYLES
           =========================== */
        
        :root {
            /* Colors - Dark Mode (Default) */
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #252d3d;
            --bg-quaternary: #2d3545;
            --text-primary: #ffffff;
            --text-secondary: #b8bcc4;
            --text-muted: #808a96;
            --accent-primary: #4f7cff;
            --accent-secondary: #6b93ff;
            --accent-tertiary: #3d5fa8;
            --accent-glow: #2d4aa8;
            --border-color: #2a3245;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f7fb;
            --bg-tertiary: #eff2f7;
            --bg-quaternary: #e8ecf2;
            --text-primary: #1a1f2e;
            --text-secondary: #4a5568;
            --text-muted: #a0aec0;
            --border-color: #e2e8f0;
            --accent-primary: #3a5ccc;
            --accent-secondary: #4f7cff;
            --accent-tertiary: #6b93ff;
            --accent-glow: #2d4aa8;
        }
        
        /* ===========================
           GLOBAL STYLES
           =========================== */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Cairo', 'Cairo-Fallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition-base), color var(--transition-base);
            position: relative;
            overflow-x: hidden;
        }
        
        /* ===========================
           ANIMATED BACKGROUND
           =========================== */
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(79, 124, 255, 0.1) 0%,
                rgba(25, 45, 61, 0) 50%,
                rgba(79, 124, 255, 0.05) 100%);
            pointer-events: none;
            z-index: -1;
            transform-origin: center;
        }
        
        body.light-mode .animated-bg {
            background: linear-gradient(135deg,
                rgba(58, 92, 204, 0.05) 0%,
                rgba(255, 255, 255, 0) 50%,
                rgba(79, 124, 255, 0.03) 100%);
        }
        
        /* ===========================
           NAVBAR STYLES
           =========================== */
        
        .navbar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-sm);
        }
        
        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
            gap: 1.5rem;
            position: relative;
        }
        
        /* Buttons group container */
        .navbar-buttons-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }
        
        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--accent-primary);
            font-weight: 700;
            font-size: 1.25rem;
            flex-shrink: 0;
            transition: transform var(--transition-fast);
        }
        
        .navbar-logo:hover {
            transform: scale(1.05);
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            color: var(--accent-primary);
            transition: color var(--transition-base);
        }
        
        .logo-text {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* ===========================
           SEARCH STYLES
           =========================== */
        
        .search-container {
            flex: 1;
            max-width: 500px;
            display: flex;
            align-items: center;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            transition: all var(--transition-base);
        }
        
        .search-container:focus-within {
            background-color: var(--bg-primary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(79, 124, 255, 0.1);
        }
        
        .search-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
        }
        
        .search-input::placeholder {
            color: var(--text-muted);
        }
        
        .search-button {
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition-fast);
            flex-shrink: 0;
        }
        
        .search-button:hover {
            color: var(--accent-primary);
        }
        
        .search-icon {
            width: 20px;
            height: 20px;
        }
        
        /* ===========================
           THEME TOGGLE STYLES
           =========================== */
        
        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            flex-shrink: 0;
        }
        
        .theme-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
            transform: scale(1.05);
        }
        
        .theme-toggle:active {
            transform: scale(0.95);
        }
        
        /* ===========================
           BUTTONS GROUP - BOOKMARKS & THEME
           =========================== */
        
        .bookmarks-toggle,
        .theme-toggle {
            margin-left: 0.5rem;
        }
        
        /* Bookmarks Button */
        .bookmarks-toggle {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            flex-shrink: 0;
        }
        
        .bookmarks-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
            transform: scale(1.05);
            border-color: var(--accent-primary);
        }
        
        .bookmarks-toggle:active {
            transform: scale(0.95);
        }
        
        body.light-mode .bookmarks-toggle {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        body.light-mode .bookmarks-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
        }
        
        /* Theme Button */
        .theme-toggle {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
            flex-shrink: 0;
        }
        
        .theme-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
            transform: scale(1.05);
            border-color: var(--accent-primary);
        }
        
        .theme-toggle:active {
            transform: scale(0.95);
        }
        
        body.light-mode .theme-toggle {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        body.light-mode .theme-toggle:hover {
            background-color: var(--accent-primary);
            color: white;
        }
        
        .bookmarks-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-primary);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            border: 2px solid var(--bg-primary);
        }
        
        /* Bookmarks Panel */
        .bookmarks-panel {
            position: fixed;
            top: 70px;
            right: -400px;
            width: 380px;
            height: calc(100vh - 70px);
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            z-index: 999;
            transition: right var(--transition-base);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
        }
        
        .bookmarks-panel.open {
            right: 0;
        }
        
        .bookmarks-panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        
        .bookmarks-panel-header h2 {
            font-size: 1.3rem;
            margin: 0;
            color: var(--text-primary);
            flex: 1;
        }
        
        .bookmarks-panel-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            padding: 0.5rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }
        
        .bookmarks-panel-close:hover {
            background-color: var(--bg-tertiary);
            color: var(--accent-primary);
        }
        
        .bookmarks-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .bookmarks-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 1rem;
            font-size: 0.95rem;
        }
        
        .bookmark-item {
            padding: 1rem;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        
        .bookmark-item:hover {
            background: var(--bg-quaternary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 12px rgba(79, 124, 255, 0.1);
        }
        
        .bookmark-item-info {
            flex: 1;
            text-align: right;
        }
        
        .bookmark-surah {
            font-weight: 600;
            color: var(--accent-primary);
            font-size: 0.95rem;
        }
        
        .bookmark-verse {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        
        .bookmark-item-star {
            color: var(--accent-primary);
            font-size: 1.2rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .bookmarks-toggle {
                display: flex;
            }
            
            .bookmarks-panel {
                width: 100%;
                left: -100%;
            }
        }
        
        /* ===========================
           MAIN CONTAINER
           =========================== */
        
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
        }
        
        /* ===========================
           SIDEBAR STYLES
           =========================== */
        
        .sidebar {
            width: 280px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background-color: var(--bg-secondary);
            z-index: 10;
        }
        
        .sidebar-header h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .sidebar-subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        
        .surah-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }
        
        .surah-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all var(--transition-fast);
            border-left: 3px solid transparent;
            gap: 1rem;
        }
        
        .surah-item:hover {
            background-color: var(--bg-tertiary);
            border-left-color: var(--accent-primary);
        }
        
        .surah-item:focus-visible {
            outline: 2px solid var(--accent-primary);
            outline-offset: -2px;
            background-color: var(--bg-tertiary);
        }
        
        .surah-item.active {
            background-color: var(--accent-tertiary);
            color: white;
            border-left-color: var(--accent-primary);
        }
        
        .surah-name {
            flex: 1;
            font-weight: 500;
        }
        
        .surah-number {
            background-color: rgba(79, 124, 255, 0.2);
            color: var(--accent-primary);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .surah-item.active .surah-number {
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
        }
        
        /* ===========================
           READING AREA STYLES
           =========================== */
        
        .reading-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .reading-area > * {
            padding: 0 2rem;
        }
        
        /* ===========================
           EMPTY STATE STYLES
           =========================== */
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 2rem;
        }
        
        .empty-state-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            opacity: 0.1;
        }
        
        .empty-state-icon svg {
            width: 60px;
            height: 60px;
            color: white;
        }
        
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .empty-state p {
            color: var(--text-muted);
            max-width: 300px;
        }
        
        /* ===========================
           LOADING STATE STYLES
           =========================== */
        
        .loading-state {
            padding: 2rem;
            animation: fadeIn var(--transition-base);
        }
        
        .skeleton-header {
            height: 60px;
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            margin-bottom: 2rem;
            animation: loading 2s infinite;
        }
        
        .skeleton-verse {
            height: 40px;
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            animation: loading 2s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* ===========================
           SURAH CONTENT STYLES
           =========================== */
        
        .surah-content {
            padding: 2rem;
            flex: 1;
        }
        
        .surah-header {
            text-align: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        
        .surah-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
            font-family: 'Amiri', 'Amiri-Fallback', Georgia, 'Traditional Arabic', serif;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .surah-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .surah-info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .surah-info-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .surah-info-value {
            color: var(--accent-primary);
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        /* ===========================
           VERSES STYLES
           =========================== */
        
        .verses-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .verse {
            padding: 1.5rem;
            background-color: var(--bg-secondary);
            border-right: 3px solid var(--accent-primary);
            border-radius: 8px;
            transition: all var(--transition-base);
        }
        
        .verse:hover {
            background-color: var(--bg-tertiary);
            transform: translateX(-4px);
            box-shadow: var(--shadow-md);
        }
        
        .verse-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .verse-number {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        /* ===========================
           BOOKMARK BUTTON STYLES
           =========================== */
        
        .verse-bookmark {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            padding: 0.5rem;
            margin-right: auto;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            position: relative;
            flex-shrink: 0;
        }
        
        .verse-bookmark:hover {
            color: var(--accent-primary);
            background-color: rgba(79, 124, 255, 0.1);
            transform: scale(1.1);
        }
        
        .verse-bookmark:active {
            transform: scale(0.95);
        }
        
        .verse-bookmark.bookmarked {
            color: var(--accent-primary);
            animation: starPopIn var(--transition-fast);
        }
        
        .verse-bookmark.bookmarked:hover {
            color: var(--accent-secondary);
            background-color: rgba(79, 124, 255, 0.15);
        }
        
        @keyframes starPopIn {
            0% {
                transform: scale(0.5) rotate(-180deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
            background-color: rgba(212, 165, 116, 0.1);
            color: var(--accent-primary);
        }
        
        body.light-mode .verse-bookmark.bookmarked {
            color: var(--accent-primary);
        }
        
        body.light-mode .verse-bookmark.bookmarked:hover {
            background-color: rgba(212, 165, 116, 0.15);
            color: var(--accent-glow);
        }
        
        /* Highlight verse when navigating from bookmarks */
        .verse.highlight-verse {
            animation: highlightVerse 2s ease-out;
        }
        
        @keyframes highlightVerse {
            0% {
                background-color: rgba(79, 124, 255, 0.3);
                border-right-color: var(--accent-secondary);
                box-shadow: 0 0 30px rgba(79, 124, 255, 0.3);
            }
            100% {
                background-color: var(--bg-tertiary);
                border-right-color: var(--accent-primary);
                box-shadow: var(--shadow-md);
            }
        }
        
        .verse-text {
            font-family: 'Amiri', 'Amiri-Fallback', Georgia, 'Traditional Arabic', serif;
            font-size: 1.5rem;
            line-height: 2;
            color: var(--text-primary);
            margin-bottom: 1rem;
            text-align: justify;
            font-weight: 400;

        .verse-translation {
            font-family: 'Tajawal', 'Cairo-Fallback', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            color: var(--text-secondary);

            padding: 1rem;
            background-color: rgba(79, 124, 255, 0.05);
            border-right: 2px solid var(--accent-primary);
            border-radius: 4px;
            margin-top: 1rem;
            font-weight: 400;
        }
        
        /* ===========================
           TAFSIR (INTERPRETATION) STYLES
           =========================== */
        
        .verse-interpretation {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .verse-tafsir {
            font-family: 'Amiri', 'Amiri-Fallback', Georgia, 'Traditional Arabic', serif;

            color: var(--text-secondary);

            background: linear-gradient(135deg, rgba(107, 147, 255, 0.08), rgba(79, 124, 255, 0.05));
            border-right: 3px solid var(--accent-secondary);

        }
        
        .verse-tafsir-english {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
            padding: 1.2rem;
            background: linear-gradient(135deg, rgba(79, 124, 255, 0.06), rgba(107, 147, 255, 0.03));
            border-left: 3px solid var(--accent-primary);
            border-radius: 6px;
            font-weight: 400;
            text-align: left;
            transition: all var(--transition-fast);
        }
        
        .verse:hover .verse-tafsir {
            background: linear-gradient(135deg, rgba(107, 147, 255, 0.12), rgba(79, 124, 255, 0.08));
            border-right-color: var(--accent-primary);

        .verse:hover .verse-tafsir-english {

            display: block;
            margin-bottom: 0.7rem;
            font-weight: 700;
            font-size: 0.95rem;
        }

        body.light-mode .verse-tafsir {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08), rgba(198, 138, 74, 0.05));

        /* ===========================
           TOAST NOTIFICATION STYLES
           =========================== */
        
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ef4444;

        .toast.warning {

        @keyframes slideUp {

        ::-webkit-scrollbar {

    </style>

    <!-- Bookmarks Panel -->

        </div>

            <p class="bookmarks-empty">لا توجد آيات محفوظة</p>

    <script>
        /**
         * Al-Quran - Premium Digital Quran Reading Application
         * API: https://api.alquran.cloud
         * 
         * FEATURES:
         * - Arabic + English translations
         * - Caching system (24-hour duration)
         * - Retry logic for failed requests
         * - Debounced search
         * - Offline detection
         * - Theme switching with system preference sync
         * - Keyboard shortcuts
         * - Accessibility support
         */

        // ===========================
        // STATE MANAGEMENT
        // ===========================

        const state = {
            surahs: [],
            currentSurah: null,
            verses: [],
            translations: [],
            tafsir: [],
            englishTafsir: [],
            isDarkMode: true,
            isLoading: false,
            cache: new Map(),
            bookmarks: new Set(), // Store bookmarked verse IDs
        };

        // ===========================
        // CONFIGURATION
        // ===========================

        const CONFIG = {
            API_BASE: 'https://api.alquran.cloud/v1',
            CACHE_DURATION: 24 * 60 * 60 * 1000,
            RETRY_ATTEMPTS: 3,
            RETRY_DELAY: 1000,
            SEARCH_DEBOUNCE: 300,
        };

        // ===========================
        // DOM SELECTORS
        // ===========================

        const DOM = {
            surahList: document.getElementById('surahList'),
            surahContent: document.getElementById('surahContent'),
            emptyState: document.getElementById('emptyState'),
            loadingState: document.getElementById('loadingState'),
            searchInput: document.getElementById('searchInput'),
            themeToggle: document.getElementById('themeToggle'),
            errorToast: document.getElementById('errorToast'),
            surahCount: document.getElementById('surahCount'),
        };

        const isDev = false; // Set to true for development
        
        function log(...args) {
            if (isDev) console.log(...args);
        }
        
        function logWarn(...args) {
            if (isDev) console.warn(...args);
        }
        
        function logError(...args) {
            console.error(...args);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function fetchWithRetry(url, attempts = CONFIG.RETRY_ATTEMPTS) {
            try {
                // Create AbortController with 10 second timeout
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timeout);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.warn('Request timeout - retrying');
                }
                if (attempts > 1) {
                    await new Promise(resolve => setTimeout(resolve, CONFIG.RETRY_DELAY));
                    return fetchWithRetry(url, attempts - 1);
                }
                throw error;
            }
        }

        function isCacheValid(key) {
            const cached = state.cache.get(key);
            if (!cached) return false;
            return (Date.now() - cached.timestamp) < CONFIG.CACHE_DURATION;
        }

        function getCached(key) {
            const cached = state.cache.get(key);
            return cached?.data || null;
        }

        function setCached(key, data) {
            state.cache.set(key, { data, timestamp: Date.now() });
        }

        // ===========================
        // API HANDLERS
        // ===========================

        async function fetchAllSurahs() {
            const cacheKey = 'all_surahs';
            if (isCacheValid(cacheKey)) {
                state.surahs = getCached(cacheKey);
                renderSurahList();
                return true;
            }

            try {
                const data = await fetchWithRetry(`${CONFIG.API_BASE}/surah`);
                if (data.status === 'OK') {
                    state.surahs = data.data;
                    setCached(cacheKey, data.data);
                    DOM.surahCount.textContent = data.data.length;
                    renderSurahList();
                    return true;
                }
                throw new Error('API returned non-OK status');
            } catch (error) {
                logError('Error fetching Surahs:', error);
                showErrorToast('فشل تحميل السور. يرجى التحقق من الاتصال بالإنترنت.');
                return false;
            }
        }

        async function fetchSurahWithTranslation(surahNumber) {
            state.isLoading = true;
            showLoadingState();

            const cacheKey = `surah_${surahNumber}_full`;
            if (isCacheValid(cacheKey)) {
                const cached = getCached(cacheKey);
                state.verses = cached.verses;
                state.currentSurah = cached.surah;
                state.translations = cached.translations || [];
                state.tafsir = cached.tafsir || [];
                state.englishTafsir = cached.englishTafsir || [];
                renderSurahContent();
                state.isLoading = false;
                return true;
            }

            try {
                const [arabicRes, englishRes, tafsirRes, englishTafsirRes] = await Promise.all([
                    fetchWithRetry(`${CONFIG.API_BASE}/surah/${surahNumber}/quran-uthmani`),
                    fetchWithRetry(`${CONFIG.API_BASE}/surah/${surahNumber}/en.sahih`),
                    fetchWithRetry(`${CONFIG.API_BASE}/surah/${surahNumber}/ar.muyassar`),
                    fetchWithRetry(`${CONFIG.API_BASE}/surah/${surahNumber}/en.pickthall`)
                ]);

                if (arabicRes.status === 'OK' && englishRes.status === 'OK') {
                    state.currentSurah = arabicRes.data;
                    state.verses = arabicRes.data.ayahs;
                    state.translations = englishRes.data.ayahs;
                    state.tafsir = tafsirRes.status === 'OK' ? tafsirRes.data.ayahs : [];
                    state.englishTafsir = englishTafsirRes.status === 'OK' ? englishTafsirRes.data.ayahs : [];

                    setCached(cacheKey, {
                        surah: state.currentSurah,
                        verses: state.verses,
                        translations: state.translations,
                        tafsir: state.tafsir,
                        englishTafsir: state.englishTafsir
                    });

                    renderSurahContent();
                    state.isLoading = false;
                    return true;
                }
                throw new Error('Failed to fetch verse data');
            } catch (error) {
                logError('Error fetching verses:', error);
                showErrorToast('فشل تحميل الآيات. يرجى حاول مرة أخرى.');
                state.isLoading = false;
                hideLoadingState();
                return false;
            }
        }

        // ===========================
        // RENDERING FUNCTIONS
        // ===========================

        function renderSurahList() {
            DOM.surahList.innerHTML = '';

            state.surahs.forEach((surah, index) => {
                const li = document.createElement('li');
                li.className = 'surah-item';
                li.role = 'listitem';
                li.dataset.surah = surah.number;
                li.innerHTML = `
                    <span class="surah-name">${surah.name}</span>
                    <span class="surah-number">${surah.number}</span>
                `;

                li.addEventListener('click', () => selectSurah(surah.number));
                li.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectSurah(surah.number);
                    }
                });

                DOM.surahList.appendChild(li);
            });
        }

        function selectSurah(surahNumber) {
            document.querySelectorAll('.surah-item').forEach(item => {
                item.classList.remove('active');
                item.setAttribute('aria-current', 'false');
            });

            const activeItem = document.querySelector(`[data-surah="${surahNumber}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                activeItem.setAttribute('aria-current', 'page');
            }

            fetchSurahWithTranslation(surahNumber);
            document.querySelector('.reading-area').scrollTop = 0;
        }

        function renderSurahContent() {
            DOM.surahContent.innerHTML = '';
            DOM.emptyState.style.display = 'none';
            hideLoadingState();

            const surah = state.currentSurah;
            const verses = state.verses;
            const translations = state.translations;
            const tafsir = state.tafsir;
            const englishTafsir = state.englishTafsir;

            if (!surah || !verses.length) {
                showErrorToast('لا توجد آيات للعرض');
                return;
            }

            const header = document.createElement('div');
            header.className = 'surah-header';
            const revelation = surah.revelationType === 'Meccan' ? 'مكية' : 'مدنية';

            header.innerHTML = `
                <h1 class="surah-title">${surah.name}</h1>
                <div class="surah-info">
                    <div class="surah-info-item">
                        <span class="surah-info-label">السورة</span>
                        <span class="surah-info-value">${surah.number}</span>
                    </div>
                    <div class="surah-info-item">
                        <span class="surah-info-label">الآيات</span>
                        <span class="surah-info-value">${verses.length}</span>
                    </div>
                    <div class="surah-info-item">
                        <span class="surah-info-label">النوع</span>
                        <span class="surah-info-value">${revelation}</span>
                    </div>
                </div>
            `;

            DOM.surahContent.appendChild(header);

            const versesContainer = document.createElement('div');
            versesContainer.className = 'verses-container';
            versesContainer.role = 'region';
            versesContainer.setAttribute('aria-label', `${surah.name} آيات`);

            verses.forEach((verse, index) => {
                const verseElement = document.createElement('article');
                verseElement.className = 'verse';

                const translation = translations[index];
                const translationText = translation ? translation.text : '';
                
                const tafsirItem = tafsir[index];
                const tafsirText = tafsirItem ? tafsirItem.text : '';
                
                const englishTafsirItem = englishTafsir[index];
                const englishTafsirText = englishTafsirItem ? englishTafsirItem.text : '';

                let verseHTML = `
                    <div class="verse-header">
                        <span class="verse-number">الآية ${verse.numberInSurah}</span>
                        <button class="verse-bookmark" data-verse-id="${surah.number}:${verse.numberInSurah}" title="أضف علامة">☆</button>
                    </div>
                    <p class="verse-text" lang="ar">${verse.text}</p>
                `;
                
                if (translationText) {
                    verseHTML += `<div class="verse-translation" lang="en"><strong>📖 Meaning:</strong> ${translationText}</div>`;
                }
                
                if (tafsirText || englishTafsirText) {
                    verseHTML += `<div class="verse-interpretation">`;
                    if (tafsirText) {
                        verseHTML += `<div class="verse-tafsir" lang="ar"><strong>التفسير:</strong> ${tafsirText}</div>`;
                    }
                    if (englishTafsirText) {
                        verseHTML += `<div class="verse-tafsir-english" lang="en"><strong>Tafsir:</strong> ${englishTafsirText}</div>`;
                    }
                    verseHTML += `</div>`;
                }

                verseElement.innerHTML = verseHTML;
                versesContainer.appendChild(verseElement);
            });

            DOM.surahContent.appendChild(versesContainer);
            
            // Add bookmark click handlers
            document.querySelectorAll('.verse-bookmark').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const verseId = btn.dataset.verseId;
                    toggleBookmark(verseId);
                });
            });
            
            // Update bookmark icons to show saved ones
            updateBookmarkIcons();
        }

        // ===========================
        // SEARCH FUNCTIONALITY
        // ===========================

        function handleSearch(query) {
            const searchTerm = query.toLowerCase().trim();
            const surahItems = document.querySelectorAll('.surah-item');

            let visibleCount = 0;

            surahItems.forEach((item) => {
                const surahName = item.querySelector('.surah-name').textContent.toLowerCase();
                const surahNumber = item.querySelector('.surah-number').textContent;

                const matches = !searchTerm || 
                               surahName.includes(searchTerm) || 
                               surahNumber.includes(searchTerm);

                item.style.display = matches ? 'flex' : 'none';
                if (matches) visibleCount++;
            });

            // Only show error if user typed something but got no results
            if (visibleCount === 0 && searchTerm) {
                showErrorToast('لم يتم العثور على نتائج');
            }
        }

        const debouncedSearch = debounce((query) => handleSearch(query), CONFIG.SEARCH_DEBOUNCE);
        DOM.searchInput.addEventListener('input', (e) => debouncedSearch(e.target.value));

        // ===========================
        // BOOKMARK SYSTEM
        // ===========================

        function loadBookmarks() {
            const saved = localStorage.getItem('bookmarks');
            if (saved) {
                state.bookmarks = new Set(JSON.parse(saved));
            }
        }

        function saveBookmarks() {
            localStorage.setItem('bookmarks', JSON.stringify(Array.from(state.bookmarks)));
        }

        function toggleBookmark(verseId) {
            if (state.bookmarks.has(verseId)) {
                state.bookmarks.delete(verseId);
                showErrorToast('تم إزالة العلامة', 'info');
            } else {
                state.bookmarks.add(verseId);
                showErrorToast('تم حفظ الآية', 'success');
            }
            saveBookmarks();
            updateBookmarkIcons();
            updateBookmarksCount();
            if (bookmarksPanel.classList.contains('open')) {
                renderBookmarksList();
            }
        }

        function isBookmarked(verseId) {
            return state.bookmarks.has(verseId);
        }

        function updateBookmarkIcons() {
            document.querySelectorAll('.verse-bookmark').forEach(btn => {
                const verseId = btn.dataset.verseId;
                if (isBookmarked(verseId)) {
                    btn.classList.add('bookmarked');
                    btn.innerHTML = '★';
                    btn.title = 'أزل العلامة';
                } else {
                    btn.classList.remove('bookmarked');
                    btn.innerHTML = '☆';
                    btn.title = 'أضف علامة';
                }
            });
        }

        function getBookmarkedVerses() {
            const bookmarkedList = [];
            state.bookmarks.forEach(verseId => {
                const [surah, verse] = verseId.split(':').map(Number);
                bookmarkedList.push({ surah, verse, id: verseId });
            });
            return bookmarkedList.sort((a, b) => a.surah !== b.surah ? a.surah - b.surah : a.verse - b.verse);
        }

        function toggleTheme() {
            state.isDarkMode = !state.isDarkMode;
            updateTheme();
        }

        function updateTheme() {
            if (state.isDarkMode) {
                document.body.classList.remove('light-mode');
                document.documentElement.style.colorScheme = 'dark';
                DOM.themeToggle.setAttribute('aria-pressed', 'true');
                DOM.themeToggle.innerHTML = '<span aria-hidden="true">🌙</span>';
            } else {
                document.body.classList.add('light-mode');
                document.documentElement.style.colorScheme = 'light';
                DOM.themeToggle.setAttribute('aria-pressed', 'false');
                DOM.themeToggle.innerHTML = '<span aria-hidden="true">☀️</span>';
            }

            localStorage.setItem('theme', state.isDarkMode ? 'dark' : 'light');
        }

        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme) {
                state.isDarkMode = savedTheme === 'dark';
            } else {
                state.isDarkMode = prefersDark;
            }

            updateTheme();
        }

        DOM.themeToggle.addEventListener('click', toggleTheme);

        // ===========================
        // LOADING STATES
        // ===========================

        function showLoadingState() {
            DOM.loadingState.removeAttribute('hidden');
            DOM.surahContent.innerHTML = '';
            DOM.emptyState.style.display = 'none';
        }

        function hideLoadingState() {
            DOM.loadingState.setAttribute('hidden', '');
        }

        // ===========================
        // ERROR HANDLING
        // ===========================

        function showErrorToast(message, type = 'error') {
            DOM.errorToast.textContent = message;
            DOM.errorToast.className = `toast ${type}`;
            DOM.errorToast.classList.add('show');

            setTimeout(() => {
                DOM.errorToast.classList.remove('show');
            }, 4000);
        }

        // ===========================
        // INITIALIZATION
        // ===========================

        async function initialize() {
            try {
                initializeTheme();
                loadBookmarks(); // Load saved bookmarks
                const success = await fetchAllSurahs();

                if (!success) {
                    showErrorToast('فشل تحميل التطبيق');
                    return;
                }

                log('✨ Al-Quran app initialized successfully');
                log(`📖 Loaded ${state.surahs.length} Surahs`);
                log(`⭐ Loaded ${state.bookmarks.size} bookmarks`);
            } catch (error) {
                logError('Initialization error:', error);
                showErrorToast('حدث خطأ أثناء تحميل التطبيق');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }

        // ===========================
        // SCROLL EFFECTS
        // ===========================

        document.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const bg = document.querySelector('.animated-bg');

            if (bg) {
                bg.style.transform = `translateY(${scrollY * 0.5}px)`;
            }
        }, { passive: true });

        // ===========================
        // KEYBOARD SHORTCUTS
        // ===========================

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                DOM.searchInput.focus();
                DOM.searchInput.select();
            }

            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                toggleTheme();
            }

            if (e.key === 'Escape' && document.activeElement === DOM.searchInput) {
                DOM.searchInput.value = '';
                handleSearch('');
            }
        });



        window.addEventListener('online', () => {
            log('Connection restored');
            showErrorToast('تم استعادة الاتصال', 'success');
        });

        window.addEventListener('offline', () => {
            log('Connection lost');
            showErrorToast('تم فقدان الاتصال بالإنترنت', 'warning');
        });

        // ===========================
        // BOOKMARKS PANEL
        // ===========================

        const bookmarksPanel = document.getElementById('bookmarksPanel');
        const bookmarksPanelClose = document.getElementById('bookmarksPanelClose');
        const bookmarksToggle = document.getElementById('bookmarksToggle');
        const bookmarksPanelContent = document.getElementById('bookmarksPanelContent');
        const bookmarksCount = document.getElementById('bookmarksCount');

        function updateBookmarksCount() {
            bookmarksCount.textContent = state.bookmarks.size;
        }

        function renderBookmarksList() {
            const bookmarked = getBookmarkedVerses();
            
            if (bookmarked.length === 0) {
                bookmarksPanelContent.innerHTML = '<p class="bookmarks-empty">لا توجد آيات محفوظة</p>';
                return;
            }
            
            let html = '';
            bookmarked.forEach(item => {
                const surah = state.surahs.find(s => s.number === item.surah);
                if (surah) {
                    html += `
                        <div class="bookmark-item" data-surah="${item.surah}" data-verse="${item.verse}">
                            <span class="bookmark-item-star">⭐</span>
                            <div class="bookmark-item-info">
                                <div class="bookmark-surah">${surah.name}</div>
                                <div class="bookmark-verse">الآية ${item.verse}</div>
                            </div>
                        </div>
                    `;
                }
            });
            
            bookmarksPanelContent.innerHTML = html;
            
            // Use event delegation to avoid memory leak
            bookmarksPanelContent.addEventListener('click', (e) => {
                const bookmarkItem = e.target.closest('.bookmark-item');
                if (bookmarkItem) {
                    const surahNum = parseInt(bookmarkItem.dataset.surah);
                    closeBookmarksPanel();
                    selectSurah(surahNum);
                    // Scroll to verse after content loads
                    setTimeout(() => {
                        const verseNum = parseInt(bookmarkItem.dataset.verse);
                        const verseEl = document.querySelector(`[data-verse-id="${surahNum}:${verseNum}"]`);
                        if (verseEl) {
                            verseEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            verseEl.closest('.verse').classList.add('highlight-verse');
                        }
                    }, 300);
                }
            }, { once: false });
        }

        function openBookmarksPanel() {
            bookmarksPanel.classList.add('open');
            renderBookmarksList();
        }

        function closeBookmarksPanel() {
            bookmarksPanel.classList.remove('open');
        }

        bookmarksToggle.addEventListener('click', () => {
            if (bookmarksPanel.classList.contains('open')) {
                closeBookmarksPanel();
            } else {
                openBookmarksPanel();
            }
        });

        bookmarksPanelClose.addEventListener('click', closeBookmarksPanel);

        // Close panel when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.bookmarks-panel') && !e.target.closest('.bookmarks-toggle')) {
                closeBookmarksPanel();
            }
        });

        // Update bookmark count on load
        updateBookmarksCount();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Premium Quran reading application with elegant design and smooth interactions.">
    <title>Qurani</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Gradient -->
    <div class="animated-bg"></div>
    
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Logo -->
            <div class="navbar-logo">
                <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="currentColor"/>
                </svg>
                <span class="logo-text">Al-Quran</span>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="ابحث عن سورة..."
                    aria-label="Search for Surah"
                >
                <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                </svg>
            </div>

            <!-- Theme Toggle -->
            <div class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" role="switch" aria-checked="true">
                <div class="toggle-track">
                    <div class="toggle-thumb"></div>
                </div>
                <span class="toggle-label">🌙</span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Sidebar - Surah List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>السور</h2>
                <p class="sidebar-subtitle">114 سورة</p>
            </div>
            <ul class="surah-list" id="surahList"></ul>
        </aside>

        <!-- Main Reading Area -->
        <main class="reading-area">
            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" width="64" height="64">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/>
                    </svg>
                </div>
                <h3>اختر سورة لتبدأ</h3>
                <p>اختر أي سورة من القائمة الجانبية لبدء القراءة</p>
            </div>

            <!-- Loading Skeleton -->
            <div class="loading-state" id="loadingState" style="display: none;">
                <div class="skeleton-header"></div>
                <div class="skeleton-verse"></div>
                <div class="skeleton-verse"></div>
                <div class="skeleton-verse"></div>
            </div>

            <!-- Surah Content -->
            <div class="surah-content" id="surahContent"></div>
        </main>
    </div>

    <!-- Error Toast -->
    <div class="toast" id="errorToast"></div>

    <script src="script.js"></script>
</body>
</html>
